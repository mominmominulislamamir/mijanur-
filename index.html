<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijanur Islam | Elite 3D Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Hind+Siliguri:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div class="wrapper">
        <nav class="navbar">
            <div class="logo">MI<span>.</span></div>
            <ul class="nav-links">
                <li><a href="#home">হোম</a></li>
                <li><a href="#about">পরিচয়</a></li>
                <li><a href="#contact">যোগাযোগ</a></li>
            </ul>
        </nav>

        <section id="home" class="hero-section">
            <div class="glass-container" id="mainCard">
                <div class="profile-area">
                    <img src="https://via.placeholder.com/150" alt="Mijanur Islam" class="profile-pic">
                </div>
                
                <h1 class="glitch" data-text="MIJANUR ISLAM">MIJANUR ISLAM</h1>
                <p class="typing-text">আমি একজন <span id="typed"></span></p>

                <div class="social-icons">
                    <a href="#"><i class="fab fa-facebook-f"></i></a>
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-linkedin-in"></i></a>
                    <a href="#"><i class="fab fa-github"></i></a>
                </div>

                <div class="action-btns">
                    <button class="btn primary-btn">প্রজেক্ট দেখুন</button>
                    <button class="btn secondary-btn">সিভি ডাউনলোড</button>
                </div>
            </div>
        </section>

        <section id="about" class="details-section">
            <div class="info-grid">
                <div class="info-card">
                    <i class="fas fa-code"></i>
                    <h3>দক্ষতা</h3>
                    <p>আধুনিক ওয়েবসাইট ডিজাইন এবং ৩ডি ইন্টারফেস তৈরিতে আমি পারদর্শী।</p>
                </div>
                <div class="info-card">
                    <i class="fas fa-rocket"></i>
                    <h3>লক্ষ্য</h3>
                    <p>প্রযুক্তির মাধ্যমে নতুন কিছু তৈরি করা এবং নিজেকে উন্নত করা।</p>
                </div>
            </div>
        </section>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/typed.js@2.0.16/dist/typed.umd.js"></script>
    <script src="script.js"></script>
</body>
</html>
